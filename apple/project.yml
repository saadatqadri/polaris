# xcodegen spec for the Polaris iPad app (docs/IOS.md, i1).
# Regenerate the .xcodeproj with:  cd apple && xcodegen generate
name: Polaris
options:
  bundleIdPrefix: com.modern.polaris
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.2.3"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  Polaris:
    type: application
    platform: iOS
    sources:
      - path: Polaris
      - path: Generated # the uniffi Swift binding, copied in by the build script
    dependencies:
      - framework: ../target/ios/PolarisFFI.xcframework
        embed: false
    settings:
      base:
        INFOPLIST_FILE: Polaris/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.modern.polaris
